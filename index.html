<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الناجح للعلوم العربية | منصة خوارزم</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="intro-screen">
        <h2 id="khwarizm-brand"></h2>
    </div>

    <nav>

        <ul>
            <li><a href="#home">الرئيسية</a></li>
            <li><a href="#courses">الكورسات</a></li>
            <li><a href="https://www.facebook.com/share/g/184XE8n7EE/">تواصل معنا</a></li>

    <header id="home">
        <div class="hero-content">

    <section id="courses" class="container">

                <button class="btn-buy">اشترك الآن</button>

        </div>

    <footer>
        <p>جميع الحقوق محفوظة لدى منصة الناجح و Khwarizm Company</p>
    </footer>

    <script src="main.js"></script>
